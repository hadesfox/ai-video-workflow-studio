    <style>
      :root {
        /* Default (Dark / 黑夜模式) */
        --bg-page: #0a0c10;
        --bg-panel: #0d111c;
        --bg-card: #1a2336;
        --border-main: #1e293b;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --accent: #3b82f6;
      }

      [data-theme='light'] {
        /* Daylight (日光模式) */
        --bg-page: #f1f5f9;
        --bg-panel: #ffffff;
        --bg-card: #e2e8f0;
        --border-main: #cbd5e1;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --accent: #2563eb;
      }

      [data-theme='camo'] {
        /* Camo (迷彩模式) */
        --bg-page: #1a2e05;
        --bg-panel: #283f09;
        --bg-card: #3f6212;
        --border-main: #4d7c0f;
        --text-primary: #f7fee7;
        --text-secondary: #bef264;
        --accent: #84cc16;
      }

      [data-theme='purple'] {
        /* Electric Purple (电光紫) */
        --bg-page: #1a032b;
        --bg-panel: #2e0545;
        --bg-card: #4c0d70;
        --border-main: #6b18a1;
        --text-primary: #faf5ff;
        --text-secondary: #d8b4fe;
        --accent: #a855f7;
      }

      [data-theme='morandi'] {
        /* Morandi (莫兰迪) */
        --bg-page: #747d8c;
        --bg-panel: #a4b0be;
        --bg-card: #ced6e0;
        --border-main: #dfe4ea;
        --text-primary: #2f3542;
        --text-secondary: #57606f;
        --accent: #70a1ff;
      }

      [data-theme='flat'] {
        /* Flat (扁平化) */
        --bg-page: #ecf0f1;
        --bg-panel: #ffffff;
        --bg-card: #f8f9fa;
        --border-main: #bdc3c7;
        --text-primary: #2c3e50;
        --text-secondary: #7f8c8d;
        --accent: #3498db;
      }

      [data-theme='retro'] {
        /* Retro (复古风) */
        --bg-page: #ede0d4;
        --bg-panel: #e6ccb2;
        --bg-card: #ddb892;
        --border-main: #b08968;
        --text-primary: #432818;
        --text-secondary: #7f5539;
        --accent: #bb9457;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              theme: {
                page: 'var(--bg-page)',
                panel: 'var(--bg-panel)',
                card: 'var(--bg-card)',
                border: 'var(--border-main)',
                primary: 'var(--text-primary)',
                secondary: 'var(--text-secondary)',
                accent: 'var(--accent)',
              }
            }
          }
        }
      }
